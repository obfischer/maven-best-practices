version: 2
updates:
  - package-ecosystem: "npm" 
    directory: "/" # Location of package manifests
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    pull-request-branch-name:
      separator: "-"
    commit-message:
      prefix: "Dependency Update: "    

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
        interval: 'weekly'
    open-pull-requests-limit: 3
    pull-request-branch-name:
        separator: "-"
    commit-message:
      prefix: "GitHub Action Update: "